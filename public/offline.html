<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080b10" />
    <title>QuickMate Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #f7f1de;
        background: #080b10;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        padding: 18px;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(242, 189, 75, 0.13), transparent 28rem),
          radial-gradient(circle at 85% 12%, rgba(111, 92, 255, 0.12), transparent 28rem),
          linear-gradient(145deg, #070a0f, #111722 52%, #090d13);
      }

      main {
        display: grid;
        width: min(520px, 100%);
        gap: 14px;
        padding: 18px;
        border: 1px solid rgba(246, 214, 150, 0.16);
        border-radius: 8px;
        background: rgba(18, 24, 34, 0.92);
        box-shadow: 0 20px 55px rgba(0, 0, 0, 0.42);
      }

      p,
      h1 {
        margin: 0;
      }

      h1 {
        color: #ffe7a0;
        font-size: clamp(2rem, 11vw, 3.1rem);
        line-height: 1;
      }

      p {
        color: #cfc6b3;
        font-size: 1rem;
        font-weight: 750;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        width: fit-content;
        padding: 0 14px;
        border-radius: 8px;
        color: #0f1812;
        background: #9fdea2;
        font-weight: 850;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>QuickMate is offline.</h1>
      <p>
        Reconnect to load the latest app shell and puzzle content. Progress already saved on this
        device stays local to this device.
      </p>
      <a href="/">Try Again</a>
    </main>
  </body>
</html>
